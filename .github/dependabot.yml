version: 2
updates:
  # Keep npm dependencies current.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine minor/patch bumps to reduce noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
