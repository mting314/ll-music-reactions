name: CI

# Runs on pull requests (the merge gate) and can be triggered manually.
# Pushes to main are validated by the deploy workflow before it ships.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same PR branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # No snapshot step: ESLint here is not type-aware, so it doesn't need
      # the dataset (and we avoid failing lint on a transient data-API blip).
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Generate data snapshot
        env:
          FORCE_SNAPSHOT: '1'
        run: bun run fetch-snapshot
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Generate data snapshot
        env:
          FORCE_SNAPSHOT: '1'
        run: bun run fetch-snapshot
      - run: bun run build
